name: Playwright Run (Headed via Xvfb)

on:
  workflow_dispatch:
    inputs:
      test_file:
        description: 'Test file name inside tests/ folder (e.g. login.spec.js)'
        required: true
      environment:
        description: 'Environment label (QA, DEV, PROD)'
        required: false
        default: 'QA'
      retries:
        description: 'Number of retries on failure'
        required: false
        default: '2'

jobs:
  run-headed:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: rails_app/automation
        run: npm install

      - name: Install Playwright + Chromium
        working-directory: rails_app/automation
        run: npx playwright install --with-deps chromium

      - name: Install Xvfb
        run: sudo apt-get install -y xvfb

      - name: Start Xvfb (virtual display)
        run: |
          Xvfb :99 -screen 0 1280x720x24 &
          sleep 2
          echo "Xvfb started on display :99"

      - name: Run Playwright tests (headed via Xvfb)
        working-directory: rails_app/automation
        env:
          PW_HEADED: 'true'
          DISPLAY: ':99'
          PW_RETRIES: ${{ github.event.inputs.retries }}
          ENVIRONMENT: ${{ github.event.inputs.environment }}
          BASE_URL: ${{ secrets.VERCEL_URL }}
          RAILS_API_URL: ${{ secrets.RENDER_URL }}
        run: node run.js ${{ github.event.inputs.test_file }}

      - name: Upload artifacts to Cloudinary + notify Rails
        if: always()
        working-directory: rails_app/automation
        env:
          RAILS_API_URL: ${{ secrets.RENDER_URL }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        run: node upload_artifacts.js

      - name: Upload raw artifacts to GH Actions (backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-headed
          path: rails_app/automation/artifacts/
          retention-days: 7
