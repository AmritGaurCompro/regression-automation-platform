name: Playwright Run (Headed via Xvfb)
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment label (QA, DEV, PROD)'
        required: false
        default: 'QA'
      retries:
        description: 'Number of retries on failure'
        required: false
        default: '2'
      test_run_id:
        description: 'Test run ID from Rails'
        required: true
      test_id:
        description: 'Test ID from Rails'
        required: true
  push:
    branches:
      - QA2.0
    paths:
      - 'rails_app/**'
      - '.github/workflows/run-headed.yml'

jobs:
  run-headed:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: rails_app/automation
        run: npm install

      - name: Install Playwright + Chromium
        working-directory: rails_app/automation
        run: npx playwright install --with-deps chromium

      - name: Install Xvfb + x11vnc + noVNC
        run: sudo apt-get install -y xvfb x11vnc novnc websockify

      - name: Start Xvfb (virtual display)
        run: |
          Xvfb :99 -screen 0 1280x720x24 &
          sleep 2
          echo "Xvfb started on display :99"

      - name: Start VNC server
        run: x11vnc -display :99 -forever -nopw -bg -quiet -shared

      - name: Start noVNC (browser-based VNC)
        run: |
          websockify --web /usr/share/novnc 6080 localhost:5900 &
          sleep 3
          echo "noVNC started on port 6080"

      - name: Start Cloudflare tunnel
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb
          cloudflared tunnel --url http://localhost:6080 > /tmp/cloudflared.log 2>&1 &
          sleep 10
          URL=$(cat /tmp/cloudflared.log | grep -o 'https://[a-zA-Z0-9.-]*\.trycloudflare\.com' | head -1)
          VNC_URL="${URL}/vnc.html"
          echo "======================================================"
          echo "VNC URL: $VNC_URL"
          echo "======================================================"
          curl -v -X POST "${{ secrets.RENDER_URL }}/api/tests/${{ github.event.inputs.test_id }}/test_runs/${{ github.event.inputs.test_run_id }}/vnc_url" \
            -H "Content-Type: application/json" \
            -d "{\"vnc_url\": \"$VNC_URL\"}"
          echo "Waiting 30 seconds for you to connect..."
          sleep 30
          echo "Starting test now..."

      - name: Debug inputs
        run: |
          echo "test_run_id: ${{ github.event.inputs.test_run_id }}"
          echo "test_id: ${{ github.event.inputs.test_id }}"
          echo "environment: ${{ github.event.inputs.environment }}"
 
      - name: Wake up Render service
        run: |
          echo "Pinging Render to wake up..."
          curl -s --max-time 90 "${{ secrets.RENDER_URL }}/api/tests" -o /dev/null || true
          echo "Waiting for Render to fully wake..."
          sleep 15
          echo "Render should be awake"

      - name: Fetch script from Rails DB and write to temp file
        id: fetch_script
        run: |
          TEST_ID="${{ github.event.inputs.test_id }}"
          echo "Fetching script for test_id=$TEST_ID..."

          for i in 1 2 3; do
            echo "Attempt $i..."
            HTTP_STATUS=$(curl -s -o /tmp/script_response.json -w "%{http_code}" \
              --max-time 90 \
              "${{ secrets.RENDER_URL }}/api/tests/$TEST_ID/script")
            echo "HTTP status: $HTTP_STATUS"
            if [ "$HTTP_STATUS" = "200" ]; then
              break
            fi
            echo "Attempt $i failed, waiting 20s before retry..."
            sleep 20
          done

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "ERROR: Rails API returned $HTTP_STATUS after 3 attempts"
            exit 1
          fi

          SCRIPT_CONTENT=$(python3 -c "
          import sys, json
          data = json.load(open('/tmp/script_response.json'))
          content = data.get('script', {}).get('raw', '').strip()
          if not content:
              sys.exit(1)
          print(content)
          ")

          if [ $? -ne 0 ]; then
            echo "ERROR: raw script is empty in API response"
            exit 1
          fi

          TEMP_FILE="rails_app/automation/tests/_dynamic_test.spec.js"
          echo "$SCRIPT_CONTENT" > "$TEMP_FILE"
          echo "Script written to $TEMP_FILE"
          echo "temp_file=$TEMP_FILE" >> $GITHUB_OUTPUT

      - name: Run Playwright tests (headed via Xvfb)
        working-directory: rails_app/automation
        env:
          PW_HEADED: 'true'
          DISPLAY: ':99'
          PW_RETRIES: ${{ github.event.inputs.retries }}
          ENVIRONMENT: ${{ github.event.inputs.environment }}
          TEST_RUN_ID: ${{ github.event.inputs.test_run_id }}
          TEST_ID: ${{ github.event.inputs.test_id }}
          BASE_URL: ${{ secrets.VERCEL_URL }}
          RAILS_API_URL: ${{ secrets.RENDER_URL }}
        run: node run.js ${{ steps.fetch_script.outputs.temp_file }}

      - name: Upload artifacts to Cloudinary + notify Rails
        if: always()
        working-directory: rails_app/automation
        env:
          RAILS_API_URL: ${{ secrets.RENDER_URL }}
          TEST_ID: ${{ github.event.inputs.test_id }}
          TEST_RUN_ID: ${{ github.event.inputs.test_run_id }}
          ENVIRONMENT: ${{ github.event.inputs.environment }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        run: node upload_artifacts.js

      - name: Upload raw artifacts to GH Actions (backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-headed
          path: rails_app/automation/artifacts/
          retention-days: 7