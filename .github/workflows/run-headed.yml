name: Playwright Run (Headed via Xvfb)

on:
  workflow_dispatch:
    inputs:
      test_file:
        description: 'Test file name inside tests/ folder (e.g. login.spec.js)'
        required: true
      environment:
        description: 'Environment label (QA, DEV, PROD)'
        required: false
        default: 'QA'
      retries:
        description: 'Number of retries on failure'
        required: false
        default: '2'
      test_run_id:
        description: 'Test run ID from Rails'
        required: false
      test_id:
        description: 'Test ID from Rails'
        required: false

  push:
    branches:
      - QA2.0
    paths:
      - 'rails_app/**'
      - '.github/workflows/run-headed.yml'

jobs:
  run-headed:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: rails_app/automation
        run: npm install

      - name: Install Playwright + Chromium
        working-directory: rails_app/automation
        run: npx playwright install --with-deps chromium

      - name: Install Xvfb + x11vnc
        run: sudo apt-get install -y xvfb x11vnc

      - name: Start Xvfb (virtual display)
        run: |
          Xvfb :99 -screen 0 1280x720x24 &
          sleep 2
          echo "Xvfb started on display :99"

      - name: Start VNC server
        run: x11vnc -display :99 -forever -nopw -bg -quiet -shared

      - name: Install + start ngrok
        env:
          NGROK_AUTHTOKEN: ${{ secrets.NGROK_AUTHTOKEN }}
        run: |
          curl -sSL https://ngrok-agent.s3.amazonaws.com/ngrok.asc \
            | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null \
            && echo "deb https://ngrok-agent.s3.amazonaws.com buster main" \
            | sudo tee /etc/apt/sources.list.d/ngrok.list \
            && sudo apt-get update \
            && sudo apt-get install ngrok
          ngrok config add-authtoken $NGROK_AUTHTOKEN
          ngrok tcp 5900 --log=stdout &
          sleep 8
          curl -s http://localhost:4040/api/tunnels | python3 -c "
          import sys, json
          tunnels = json.load(sys.stdin)['tunnels']
          if tunnels:
              url = tunnels[0]['public_url'].replace('tcp://', '')
              print('====================================================')
              print('VNC URL (open in RealVNC Viewer):')
              print(f'   {url}')
              print('====================================================')
              print('Waiting 30 seconds for you to connect...')
          else:
              print('No tunnels found - check NGROK_AUTHTOKEN secret')
          "
          sleep 30
          echo "Starting test now..."

      - name: Debug inputs
        run: |
          echo "test_file: ${{ github.event.inputs.test_file }}"
          echo "test_run_id: ${{ github.event.inputs.test_run_id }}"
          echo "test_id: ${{ github.event.inputs.test_id }}"
          echo "environment: ${{ github.event.inputs.environment }}"

      - name: Run Playwright tests (headed via Xvfb)
        working-directory: rails_app/automation
        env:
          PW_HEADED: 'true'
          DISPLAY: ':99'
          PW_RETRIES: ${{ github.event.inputs.retries }}
          ENVIRONMENT: ${{ github.event.inputs.environment }}
          TEST_RUN_ID: ${{ github.event.inputs.test_run_id }}
          TEST_ID: ${{ github.event.inputs.test_id }}
          BASE_URL: ${{ secrets.VERCEL_URL }}
          RAILS_API_URL: ${{ secrets.RENDER_URL }}
        run: node run.js ${{ github.event.inputs.test_file }}

      - name: Upload artifacts to Cloudinary + notify Rails
        if: always()
        working-directory: rails_app/automation
        env:
          RAILS_API_URL: ${{ secrets.RENDER_URL }}
          TEST_ID: ${{ github.event.inputs.test_id }}
          TEST_RUN_ID: ${{ github.event.inputs.test_run_id }}
          ENVIRONMENT: ${{ github.event.inputs.environment }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        run: node upload_artifacts.js

      - name: Upload raw artifacts to GH Actions (backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-headed
          path: rails_app/automation/artifacts/
          retention-days: 7
