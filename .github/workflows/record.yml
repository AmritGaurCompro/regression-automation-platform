name: Playwright Record (codegen)

on:
  workflow_dispatch:
    inputs:
      file_name:
        description: 'Test file name (must end with .spec.js)'
        required: true
      branch:
        description: 'Branch to checkout and commit back to'
        required: false
        default: 'QA3.0'
      test_id:
        description: 'Test ID from Rails'
        required: false

jobs:
  record:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          ref: ${{ github.event.inputs.branch }}
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: rails_app/automation
        run: npm install

      - name: Install Playwright + Chromium
        working-directory: rails_app/automation
        run: npx playwright install --with-deps chromium

      - name: Install Xvfb + x11vnc + noVNC
        run: sudo apt-get install -y xvfb x11vnc novnc websockify

      - name: Start Xvfb (virtual display)
        run: |
          Xvfb :99 -screen 0 1280x720x24 &
          sleep 2
          echo "Xvfb started on display :99"

      - name: Start VNC server
        run: x11vnc -display :99 -forever -nopw -bg -quiet -shared

      - name: Start noVNC (browser-based VNC)
        run: |
          websockify --web /usr/share/novnc 6080 localhost:5900 &
          sleep 3
          echo "noVNC started on port 6080"

      - name: Start Cloudflare tunnel
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb
          cloudflared tunnel --url http://localhost:6080 > /tmp/cloudflared.log 2>&1 &
          sleep 10
          URL=$(cat /tmp/cloudflared.log | grep -o 'https://[a-zA-Z0-9.-]*\.trycloudflare\.com' | head -1)
          VNC_URL="${URL}/vnc.html"
          echo "======================================================"
          echo "VNC URL: $VNC_URL"
          echo "======================================================"
          echo "Sending VNC URL to Rails API..."
          curl -s -X POST "${{ secrets.RENDER_URL }}/api/tests/${{ github.event.inputs.test_id }}/vnc_url" \
            -H "Content-Type: application/json" \
            -d "{\"vnc_url\": \"$VNC_URL\"}"
          echo "VNC URL sent to Rails API"
          echo "Waiting 30 seconds for you to connect..."
          sleep 30
          echo "Starting codegen now..."

      - name: Run Playwright codegen (record)
        working-directory: rails_app/automation
        env:
          DISPLAY: ':99'
        run: node record.js record ${{ github.event.inputs.file_name }}

      - name: Verify generated test file exists
        working-directory: rails_app/automation
        run: |
          FILE="tests/${{ github.event.inputs.file_name }}"
          if [ -f "$FILE" ]; then
            echo "✅ Generated test file found: $FILE"
            cat "$FILE"
          else
            echo "❌ Test file not found"
            exit 1
          fi

      - name: Commit generated test back to branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rails_app/automation/tests/${{ github.event.inputs.file_name }}
          git diff --staged --quiet && echo "No changes to commit" || \
          git commit -m "chore: add generated playwright test [${{ github.event.inputs.file_name }}]"
          git push origin ${{ github.event.inputs.branch }}

      - name: Clear VNC URL on Rails
        if: always()
        run: |
          curl -s -X POST "${{ secrets.RENDER_URL }}/api/tests/${{ github.event.inputs.test_id }}/vnc_url" \
            -H "Content-Type: application/json" \
            -d "{\"vnc_url\": null}"
          echo "VNC URL cleared"
