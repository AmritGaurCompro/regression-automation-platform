name: Playwright Record (codegen)

on:
  workflow_dispatch:
    inputs:
      file_name:
        description: 'Test file name (must end with .spec.js)'
        required: true
      test_id:
        description: 'Test ID from Rails'
        required: false

jobs:
  record:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          ref: QA4.0
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: rails_app/automation
        run: npm install

      - name: Install Playwright + Chromium
        working-directory: rails_app/automation
        run: npx playwright install --with-deps chromium

      - name: Install Xvfb + x11vnc + noVNC
        run: sudo apt-get install -y xvfb x11vnc novnc websockify

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Start Xvfb (virtual display)
        run: |
          Xvfb :99 -screen 0 1280x720x24 &
          sleep 2
          echo "Xvfb started on display :99"

      - name: Start VNC server
        run: x11vnc -display :99 -forever -nopw -bg -quiet -shared

      - name: Start noVNC (browser-based VNC)
        run: |
          websockify --web /usr/share/novnc 6080 localhost:5900 &
          sleep 3
          echo "noVNC started on port 6080"

      - name: Start Cloudflare tunnel and notify Rails
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb
          cloudflared tunnel --url http://localhost:6080 > /tmp/cloudflared.log 2>&1 &
          sleep 10

          echo "=== Cloudflare log ==="
          cat /tmp/cloudflared.log

          URL=$(cat /tmp/cloudflared.log | grep -o 'https://[a-zA-Z0-9.-]*\.trycloudflare\.com' | head -1)
          echo "=== Extracted URL: '${URL}' ==="

          if [ -z "$URL" ]; then
            echo "❌ Failed to extract Cloudflare URL"
            exit 1
          fi

          VNC_URL="${URL}/vnc.html"
          echo "VNC URL: $VNC_URL"
          echo "test_id: ${{ github.event.inputs.test_id }}"

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "${{ secrets.RENDER_URL }}/api/record_tests/${{ github.event.inputs.test_id }}/vnc_url" \
            -H "Content-Type: application/json" \
            -d "{\"vnc_url\": \"$VNC_URL\"}")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "Response code: $HTTP_CODE"
          echo "Response body: $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Failed to send VNC URL to Rails"
            exit 1
          fi

          echo "✅ VNC URL sent successfully"
          echo "Waiting 30 seconds for you to connect..."
          sleep 30
          echo "Starting codegen now..."

      - name: Wake up Render
        run: |
          echo "Pinging Render to wake it up..."
          curl -s --max-time 90 "${{ secrets.RENDER_URL }}/api/tests" > /dev/null || true
          echo "Render should be awake now"

      - name: Run Playwright codegen (record)
        working-directory: rails_app/automation
        env:
          DISPLAY: ':99'
          TEST_ID: ${{ github.event.inputs.test_id }}
          RAILS_URL: ${{ secrets.RENDER_URL }}
          NODE_DEBUG: http,https
        run: node record.js record ${{ github.event.inputs.file_name }}

      - name: Verify generated test file exists
        working-directory: rails_app/automation
        run: |
          FILE="tests/${{ github.event.inputs.file_name }}"
          if [ -f "$FILE" ]; then
            echo "✅ Generated test file found: $FILE"
            cat "$FILE"
          else
            echo "❌ Test file not found"
            exit 1
          fi

      - name: Send script content to Rails
        working-directory: rails_app/automation
        run: |
          FILE="tests/${{ github.event.inputs.file_name }}"
          CONTENT=$(cat "$FILE")

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "${{ secrets.RENDER_URL }}/api/record_tests/${{ github.event.inputs.test_id }}/script_content" \
            -H "Content-Type: application/json" \
            --data-binary @- <<EOF
          {"content": $(echo "$CONTENT" | jq -Rs .)}
          EOF
          )
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "Response code: $HTTP_CODE"
          echo "Response body: $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Failed to send script content to Rails"
            exit 1
          fi

          echo "✅ Script content saved to DB"

      - name: Clear VNC URL on Rails
        if: always()
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "${{ secrets.RENDER_URL }}/api/record_tests/${{ github.event.inputs.test_id }}/vnc_url" \
            -H "Content-Type: application/json" \
            -d '{"vnc_url": null}')
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          echo "Clear VNC response code: $HTTP_CODE"
          echo "VNC URL cleared"