services:
  - type: web
    name: your-app-name
    env: ruby
    rootDir: rails_app
    buildCommand: |
      curl -fsSL https://deb.nodesource.com/setup_22.x | bash - &&
      apt-get install -y nodejs &&
      bundle install &&
      rails db:migrate &&
      cd ../automation &&
      npm install &&
      apt-get install -y libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libgbm1 libasound2 &&
      npx playwright install chromium
    startCommand: bundle exec rails server -b 0.0.0.0
