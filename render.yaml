services:
  - type: web
    name: your-app-name
    env: ruby
    rootDir: rails_app
    buildCommand: |
      curl -fsSL https://deb.nodesource.com/setup_22.x | bash - &&
      apt-get install -y nodejs &&
      bundle install &&
      rails db:migrate &&
      cd automation &&
      npm install &&
      npx playwright install --with-deps chromium
    startCommand: bundle exec rails server -b 0.0.0.0 -p ${PORT:-3000}
